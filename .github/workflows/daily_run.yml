name: Daily Dashboard Run

on:
  schedule:
    - cron: "0 14 * * *"    # 08:00 CST (UTC-6) — morning run
    - cron: "30 21 * * *"   # 15:30 CST (UTC-6) — afternoon run
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node 24 ahead of June 2026 forced migration

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_GCP_KEY:   ${{ secrets.GCP_SERVICE_ACCOUNT_KEY != '' }}
      HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      HAS_MAIL:      ${{ secrets.MAIL_USERNAME != '' }}

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install papermill nbconvert ipykernel anthropic
          python -m ipykernel install --user --name python3

      # ── BigQuery credentials (optional) ──────────────────────────────────
      # To enable BigQuery GDELT, add your GCP service-account JSON as a
      # repository secret named GCP_SERVICE_ACCOUNT_KEY (Settings → Secrets).
      # If the secret is absent the workflow falls back to the REST API.
      - name: Write GCP credentials
        if: env.HAS_GCP_KEY == 'true'
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$GCP_KEY" > /tmp/gcp_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json" >> $GITHUB_ENV

      # ── Run notebook with papermill ───────────────────────────────────────
      - name: Run dashboard notebook
        run: |
          mkdir -p outputs
          papermill \
            conflict_escalation_dashboard_ml_pdf_v5.ipynb \
            outputs/executed_notebook.ipynb \
            -p USE_DRIVE False \
            -p OUTPUT_DIR "outputs/" \
            -p ENABLE_BIGQUERY ${{ env.HAS_GCP_KEY == 'true' && 'True' || 'False' }} \
            -p GCP_PROJECT_ID "${{ secrets.GCP_PROJECT_ID || 'iran-conflict-dashboard' }}" \
            --kernel python3 \
            --execution-timeout 1200 \
            --report-mode

      # ── Detect regime change and build alert payload ──────────────────────
      # Compares today's regime/ICEI against the last committed snapshot in
      # latest/conflict_dashboard_latest.csv.  Writes alert metadata to
      # GITHUB_ENV so downstream steps can branch on it.
      #
      # Alert fatigue management: regime alerts only fire on FIRST ENTRY into
      # a new regime.  We track the last alerted regime in
      # latest/last_alerted_regime.txt so repeat runs in the same regime are
      # silent.  ICEI threshold alerts also deduplicate — each crossing fires
      # only once per direction (tracked in latest/icei_alerted_thresholds.txt).
      - name: Detect regime change
        if: success()
        run: |
          python3 - <<'PYEOF'
          import csv, os, pathlib

          def read_latest(path):
              try:
                  with open(path) as f:
                      rows = list(csv.DictReader(f))
                  return rows[0] if rows else {}
              except FileNotFoundError:
                  return {}

          def read_text(path, default=""):
              try:
                  return pathlib.Path(path).read_text().strip()
              except FileNotFoundError:
                  return default

          prev = read_latest("latest/conflict_dashboard_latest.csv")
          curr = read_latest("outputs/conflict_dashboard_latest.csv")

          prev_regime = prev.get("portfolio_regime", "unknown")
          curr_regime = curr.get("portfolio_regime", "unknown")

          def safe_float(d, k):
              try: return float(d.get(k, "nan"))
              except: return float("nan")

          prev_icei  = safe_float(prev, "icei")
          curr_icei  = safe_float(curr, "icei")
          curr_p_esc = safe_float(curr, "p_escalation")
          curr_score = safe_float(curr, "escalation_score")
          curr_hormuz = safe_float(curr, "hormuz_closure_prob")
          curr_exp   = safe_float(curr, "expansion_index_val")

          # ── Alert fatigue: regime ─────────────────────────────────────────
          # Only alert on FIRST entry into a regime — not every run.
          # last_alerted_regime.txt stores the regime we last sent an alert for.
          last_alerted_regime = read_text("latest/last_alerted_regime.txt", "")
          regime_changed = (prev_regime != curr_regime and prev_regime != "unknown")
          # Suppress if we already alerted on this exact regime
          regime_alert = regime_changed and (curr_regime != last_alerted_regime)

          # ── Alert fatigue: ICEI thresholds ────────────────────────────────
          # icei_alerted_thresholds.txt stores comma-separated already-alerted tags
          # e.g.  "above_70,above_80"  — prevents duplicate alerts per crossing.
          alerted_thresholds = set(read_text("latest/icei_alerted_thresholds.txt", "").split(","))
          alerted_thresholds.discard("")

          icei_alert = ""
          new_threshold_tag = ""

          if curr_icei == curr_icei and prev_icei == prev_icei:  # not NaN
              if prev_icei < 90 <= curr_icei and "above_90" not in alerted_thresholds:
                  icei_alert = f"ICEI crossed above 90 ({curr_icei:.1f}) — extreme escalation territory"
                  new_threshold_tag = "above_90"
              elif prev_icei < 80 <= curr_icei and "above_80" not in alerted_thresholds:
                  icei_alert = f"ICEI crossed above 80 ({curr_icei:.1f}) — high escalation territory"
                  new_threshold_tag = "above_80"
              elif prev_icei < 70 <= curr_icei and "above_70" not in alerted_thresholds:
                  icei_alert = f"ICEI crossed above 70 ({curr_icei:.1f}) — elevated escalation territory"
                  new_threshold_tag = "above_70"
              elif prev_icei >= 70 > curr_icei and "below_70" not in alerted_thresholds:
                  icei_alert = f"ICEI dropped below 70 ({curr_icei:.1f}) — leaving elevated territory"
                  new_threshold_tag = "below_70"
                  # Reset above_70/80/90 so they can fire again next time
                  alerted_thresholds -= {"above_70", "above_80", "above_90"}
              elif prev_icei > 30 >= curr_icei and "below_30" not in alerted_thresholds:
                  icei_alert = f"ICEI dropped below 30 ({curr_icei:.1f}) — low-pressure territory"
                  new_threshold_tag = "below_30"
              elif prev_icei <= 30 < curr_icei and "above_30" not in alerted_thresholds:
                  icei_alert = f"ICEI crossed above 30 ({curr_icei:.1f}) — leaving low-pressure territory"
                  new_threshold_tag = "above_30"
                  alerted_thresholds.discard("below_30")

          should_alert = regime_alert or bool(icei_alert)

          # ── Update persisted fatigue-management state ─────────────────────
          # These files are committed by the "Commit latest snapshot" step below.
          pathlib.Path("outputs").mkdir(exist_ok=True)
          if regime_alert:
              pathlib.Path("outputs/last_alerted_regime.txt").write_text(curr_regime)
          if new_threshold_tag:
              alerted_thresholds.add(new_threshold_tag)
              pathlib.Path("outputs/icei_alerted_thresholds.txt").write_text(
                  ",".join(sorted(alerted_thresholds))
              )

          env_file = os.environ["GITHUB_ENV"]
          with open(env_file, "a") as f:
              f.write(f"REGIME_CHANGED={'true' if regime_alert else 'false'}\n")
              f.write(f"SHOULD_ALERT={'true' if should_alert else 'false'}\n")
              f.write(f"PREV_REGIME={prev_regime}\n")
              f.write(f"CURR_REGIME={curr_regime}\n")
              f.write(f"CURR_ICEI={curr_icei:.1f}\n")
              f.write(f"CURR_P_ESC={curr_p_esc:.3f}\n")
              f.write(f"CURR_SCORE={curr_score:.3f}\n")
              f.write(f"ICEI_ALERT={icei_alert}\n")
              f.write(f"CURR_HORMUZ={curr_hormuz:.1f}\n")
              f.write(f"CURR_EXP_IDX={curr_exp:.3f}\n")

          print(f"Regime: {prev_regime} → {curr_regime} | ICEI: {prev_icei:.1f} → {curr_icei:.1f}")
          print(f"Hormuz closure prob: {curr_hormuz:.1f}/100 | Expansion index: {curr_exp:.3f}")
          print(f"regime_alert={regime_alert} icei_alert={bool(icei_alert)} should_alert={should_alert}")
          print(f"Last alerted regime: '{last_alerted_regime}' | Alerted thresholds: {alerted_thresholds}")
          PYEOF

      # ── Generate Claude summary ───────────────────────────────────────────
      # Calls Claude Haiku to produce a plain-English analyst briefing from
      # the CSV outputs. Writes outputs/email_summary.html + .txt.
      # Skipped silently if ANTHROPIC_API_KEY is not set.
      - name: Generate Claude summary
        if: success() && env.HAS_ANTHROPIC == 'true'
        continue-on-error: true   # billing/API errors don't block email or artifacts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: outputs
          REGIME_CHANGED: ${{ env.REGIME_CHANGED }}
          PREV_REGIME: ${{ env.PREV_REGIME }}
          CURR_REGIME: ${{ env.CURR_REGIME }}
          ICEI_ALERT: ${{ env.ICEI_ALERT }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: python3 scripts/generate_summary.py

      # ── Send email digest ─────────────────────────────────────────────────
      # Sends the Claude-generated HTML summary to the MAIL_TO distribution
      # list. Requires MAIL_SERVER / MAIL_PORT / MAIL_USERNAME / MAIL_PASSWORD
      # / MAIL_TO secrets. Gmail users: create an App Password at
      # myaccount.google.com/apppasswords (2FA must be enabled).
      # MAIL_TO accepts comma-separated addresses:
      #   you@gmail.com,colleague@firm.com,analyst@hedge.fund
      - name: Send email digest
        if: env.HAS_MAIL == 'true'
        continue-on-error: true
        env:
          MAIL_SERVER:   ${{ secrets.MAIL_SERVER }}
          MAIL_PORT:     ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO:       ${{ secrets.MAIL_TO }}
          REGIME_CHANGED: ${{ env.REGIME_CHANGED }}
          CURR_REGIME:   ${{ env.CURR_REGIME }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, smtplib, pathlib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import date

          # ── Debug: print which env vars are present ──────────────────────
          print(f"DEBUG MAIL_SERVER   : {os.environ.get('MAIL_SERVER', 'NOT SET')}")
          print(f"DEBUG MAIL_PORT     : {os.environ.get('MAIL_PORT', 'NOT SET')}")
          print(f"DEBUG MAIL_USERNAME : {'SET' if os.environ.get('MAIL_USERNAME') else 'NOT SET'}")
          print(f"DEBUG MAIL_PASSWORD : {'SET' if os.environ.get('MAIL_PASSWORD') else 'NOT SET'}")
          print(f"DEBUG MAIL_TO       : {os.environ.get('MAIL_TO', 'NOT SET')}")
          print(f"DEBUG REGIME_CHANGED: {os.environ.get('REGIME_CHANGED', 'NOT SET')}")
          print(f"DEBUG CURR_REGIME   : {os.environ.get('CURR_REGIME', 'NOT SET')}")

          today      = date.today().isoformat()
          server     = os.environ.get("MAIL_SERVER",   "smtp.gmail.com")
          port_str   = os.environ.get("MAIL_PORT", "465")
          username   = os.environ.get("MAIL_USERNAME", "")
          password   = os.environ.get("MAIL_PASSWORD", "")
          mail_to    = os.environ.get("MAIL_TO", "")

          if not username:
              print("ERROR: MAIL_USERNAME secret is not set — cannot send email.")
              sys.exit(1)
          if not password:
              print("ERROR: MAIL_PASSWORD secret is not set — cannot send email.")
              sys.exit(1)
          if not mail_to:
              print("ERROR: MAIL_TO secret is not set — no recipients configured.")
              sys.exit(1)

          try:
              port = int(port_str)
          except ValueError:
              print(f"ERROR: MAIL_PORT '{port_str}' is not a valid integer — defaulting to 465.")
              port = 465

          recipients = [r.strip() for r in mail_to.split(",") if r.strip()]
          print(f"Recipients ({len(recipients)}): {recipients}")

          regime_changed = os.environ.get("REGIME_CHANGED", "false") == "true"
          curr_regime    = os.environ.get("CURR_REGIME", "")

          subject_prefix = "⚠️ ALERT — " if regime_changed else ""
          subject = f"{subject_prefix}Iran Conflict Dashboard — {today} ({curr_regime})"
          print(f"Subject: {subject}")

          html_path = pathlib.Path("outputs/email_summary.html")
          txt_path  = pathlib.Path("outputs/email_summary.txt")

          print(f"HTML summary exists: {html_path.exists()}")
          print(f"TXT summary exists : {txt_path.exists()}")

          if html_path.exists():
              html_body = html_path.read_text(encoding="utf-8")
          else:
              html_body = "<p>Summary unavailable — see run artifacts.</p>"

          txt_body = txt_path.read_text(encoding="utf-8") if txt_path.exists() else "Summary unavailable."

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = username
          msg["To"]      = ", ".join(recipients)
          msg.attach(MIMEText(txt_body,  "plain", "utf-8"))
          msg.attach(MIMEText(html_body, "html",  "utf-8"))

          print(f"Connecting to {server}:{port} via SMTP_SSL...")
          with smtplib.SMTP_SSL(server, port) as smtp:
              smtp.login(username, password)
              smtp.sendmail(username, recipients, msg.as_string())
          print("Email sent successfully.")
          PYEOF

      # ── Post regime alert as GitHub issue comment ─────────────────────────
      # Uses the built-in GITHUB_TOKEN — no extra secrets needed.
      # Creates a 'dashboard-alert' issue if one doesn't exist, then appends
      # a comment. Watch the issue to receive GitHub email notifications.
      - name: Post regime alert
        if: success() && env.SHOULD_ALERT == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          REPO="${{ github.repository }}"
          DATE=$(date -u +%Y-%m-%d)

          BODY="## Dashboard Alert — ${DATE}"$'\n\n'
          if [ "$REGIME_CHANGED" = "true" ]; then
            BODY+="🔄 **Regime change:** \`${PREV_REGIME}\` → \`${CURR_REGIME}\`"$'\n\n'
          fi
          if [ -n "$ICEI_ALERT" ]; then
            BODY+="📊 **ICEI alert:** ${ICEI_ALERT}"$'\n\n'
          fi
          BODY+="| Metric | Value |"$'\n'
          BODY+="|---|---|"$'\n'
          BODY+="| Regime | **${CURR_REGIME}** |"$'\n'
          BODY+="| ICEI | ${CURR_ICEI} |"$'\n'
          BODY+="| P(Escalation) | ${CURR_P_ESC} |"$'\n'
          BODY+="| Escalation Score | ${CURR_SCORE} |"$'\n'
          BODY+="| Hormuz Closure Risk | ${CURR_HORMUZ}/100 |"$'\n'
          BODY+="| Expansion Index | ${CURR_EXP_IDX} |"$'\n\n'
          BODY+="[Full run artifacts](${RUN_URL})"

          ISSUE_NUM=$(gh issue list --repo "$REPO" \
            --label "dashboard-alert" --state open \
            --json number --jq '.[0].number // empty')

          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(gh issue create \
              --repo "$REPO" \
              --title "Iran Conflict Dashboard — Regime & ICEI Alerts" \
              --label "dashboard-alert" \
              --body "This issue is automatically maintained by the daily dashboard workflow. Subscribe (**Watch → Custom → Issues**) to receive email notifications on regime changes and ICEI threshold crossings." \
              --json number --jq '.number')
            echo "Created alert issue #${ISSUE_NUM}"
          fi

          gh issue comment "$ISSUE_NUM" --repo "$REPO" --body "$BODY"
          echo "Posted alert to issue #${ISSUE_NUM}"

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-outputs-${{ github.run_id }}
          path: |
            outputs/conflict_dashboard_report.pdf
            outputs/conflict_escalation_dashboard_output.csv
            outputs/conflict_dashboard_latest.csv
            outputs/escalation_index_history.csv
            outputs/data_availability_summary.csv
            outputs/conflict_escalation_chart.png
            outputs/escalation_index_chart.png
            outputs/backtest_validation_chart.png
            outputs/email_summary.html
            outputs/email_summary.txt
            outputs/executed_notebook.ipynb
          retention-days: 30

      # ── Commit latest snapshot back to repo ──────────────────────────────
      # Keeps a rolling latest-day CSV so the next run can detect regime changes.
      # Also persists alert fatigue state (last_alerted_regime, icei thresholds)
      # so repeated runs in the same regime don't spam alerts.
      - name: Commit latest snapshot
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p latest
          cp outputs/conflict_dashboard_latest.csv  latest/ 2>/dev/null || true
          cp outputs/data_availability_summary.csv  latest/ 2>/dev/null || true
          cp outputs/conflict_escalation_chart.png  latest/ 2>/dev/null || true
          # Alert fatigue state — only copy if the detect-regime-change step wrote them
          cp outputs/last_alerted_regime.txt       latest/ 2>/dev/null || true
          cp outputs/icei_alerted_thresholds.txt   latest/ 2>/dev/null || true
          git add latest/
          git diff --cached --quiet || git commit -m "chore: daily dashboard snapshot $(date -u +%Y-%m-%d)"
          git push
